const allSlides = [];
pdfs.forEach(pdf => {
  for (let s = 1; s <= pdf.totalSlides; s++) {
    allSlides.push({ pdf: pdf.id, slide: s, key: `${pdf.id}-${s}` });
  }
});
const totalSlides = allSlides.length;

let currentSlide = 0;
const completed = new Set();

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let curPdf = -1;
  allSlides.forEach((s, i) => {
    if (s.pdf !== curPdf) {
      curPdf = s.pdf;
      const pdf = pdfs.find(p => p.id === curPdf);
      html += `<h3>${pdf.label}</h3>`;
    }
    html += `<div class="sidebar-item" data-idx="${i}" id="sb-${i}">
      <span class="check"></span>Diapo ${s.slide}
    </div>`;
  });
  sb.innerHTML = html;
  sb.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.idx)));
  });
}

function buildSlide(s, idx) {
  const pdf = pdfs.find(p => p.id === s.pdf);
  const fcs = flashcardMap[s.key] || [];
  const imgSrc = `slides/pdf${s.pdf}_slide${s.slide}.png`;

  let fcHtml = '';
  if (fcs.length > 0) {
    fcHtml = `<div class="fc-section">
      <h3>${fcs.length} Flashcard${fcs.length>1?'s':''}</h3>
      <button class="btn-reveal" onclick="revealAll(${idx})">Révéler toutes les réponses</button>
      <div class="fc-grid">`;
    fcs.forEach((fc, fi) => {
      fcHtml += `<div class="flashcard" onclick="this.classList.toggle(\'flipped\')" id="fc-${idx}-${fi}">
        <div class="fc-inner">
          <div class="fc-front">
            <span class="fc-num">${fi+1}</span>
            <span class="fc-text">${fc.q}</span>
            <span class="fc-hint">cliquer</span>
          </div>
          <div class="fc-back">
            <span class="fc-num">${fi+1}</span>
            <span class="fc-text">${fc.a}</span>
          </div>
        </div>
      </div>`;
    });
    fcHtml += '</div></div>';
  } else {
    fcHtml = '<p class="no-fc">Pas de flashcards pour cette diapo.</p>';
  }

  return `<div class="slide-section" id="slide-${idx}">
    <span class="pdf-badge ${pdf.badge}">PDF ${pdf.id} — ${pdf.name} — Diapo ${s.slide}/${pdf.totalSlides}</span>
    <div class="slide-img-wrap">
      <img src="${imgSrc}" alt="Diapo ${s.slide}" loading="lazy">
    </div>
    ${fcHtml}
    <div class="bottom-nav">
      <button class="btn btn-prev" onclick="goTo(${idx-1})" ${idx===0?'disabled':''}>&#8592; Précédent</button>
      <span style="color:#666;font-size:0.85rem">${idx+1} / ${totalSlides}</span>
      <button class="btn btn-next" onclick="goTo(${idx+1})" ${idx===totalSlides-1?'disabled':''}>Suivant &#8594;</button>
    </div>
  </div>`;
}

function buildMain() {
  const main = document.getElementById('main');
  let html = `<div class="pdf-order" id="slide-order" style="display:none">
    <h2>Ordre des PDF pour la plateforme</h2>
    <ol>${pdfs.map(p => `<li><strong>${p.name}.pdf</strong> — ${p.label}</li>`).join('')}</ol>
  </div>`;
  allSlides.forEach((s, i) => { html += buildSlide(s, i); });
  main.innerHTML = html;
}

function goTo(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  const cur = document.getElementById(`slide-${currentSlide}`);
  if (cur) cur.classList.remove('active');
  completed.add(currentSlide);
  const sbOld = document.getElementById(`sb-${currentSlide}`);
  if (sbOld) { sbOld.classList.add('completed'); sbOld.querySelector('.check').textContent = '\u2713 '; }
  currentSlide = idx;
  document.getElementById(`slide-${idx}`).classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  const sbNew = document.getElementById(`sb-${idx}`);
  if (sbNew) { sbNew.classList.add('active'); sbNew.scrollIntoView({block:'nearest'}); }
  document.getElementById('progressFill').style.width = `${((idx+1)/totalSlides)*100}%`;
  document.getElementById('navCounter').textContent = `${idx+1} / ${totalSlides}`;
  document.getElementById('slide-order').style.display = idx === 0 ? 'block' : 'none';
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function revealAll(slideIdx) {
  const s = allSlides[slideIdx];
  const fcs = flashcardMap[s.key] || [];
  fcs.forEach((_, fi) => {
    const el = document.getElementById(`fc-${slideIdx}-${fi}`);
    if (el) el.classList.add('flipped');
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentSlide + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentSlide - 1); }
});

buildSidebar();
buildMain();
goTo(0);
</script>
