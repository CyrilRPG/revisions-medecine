    idx += p.totalSlides;
  }
  return idx + sNum;

    idx += p.totalSlides;
  }
  return { pdfId: pdfs[pdfs.length-1].id, sNum: pdfs[pdfs.length-1].totalSlides };
}

function buildSidebar() {
  const sb = document.getElementById("sidebar");
  let h = "";
  for (const p of pdfs) {
    h += `<h3>${p.label}</h3>`;
    for (let s = 1; s <= p.totalSlides; s++) {
      const g = globalIndex(p.id, s);
      const active = g === curSlide ? "active" : "";
      const done = completed.has(g) ? "completed" : "";
      const check = completed.has(g) ? '<span class="check">✓</span>' : "";
      h += `<div class="sidebar-item ${active} ${done}" onclick="goSlide(${g})">${check}Diapo ${s}</div>`;
    }
  }
  sb.innerHTML = h;
}

function buildSlide() {
  const { pdfId, sNum } = fromGlobal(curSlide);
  curPdf = pdfId;
  const p = pdfs.find(p => p.id === pdfId);
  const sid = slideId(pdfId, sNum);
  const cards = flashcardMap[sid] || [];
  const g = curSlide;

  let fcHtml = "";
  if (cards.length > 0) {
    fcHtml += `<div class="fc-section"><h3>Flashcards (${cards.length})</h3>`;
    fcHtml += `<button class="btn-reveal" onclick="revealAll()">Révéler toutes les réponses</button>`;
    fcHtml += `<div class="fc-grid">`;
    cards.forEach((c, i) => {
      fcHtml += `
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
          <div class="fc-inner">
            <div class="fc-front"><div class="fc-num">${i+1}</div><div class="fc-text">${c.q}</div><div class="fc-hint">cliquer</div></div>
            <div class="fc-back"><div class="fc-num">✓</div><div class="fc-text">${c.a}</div></div>
          </div>
        </div>`;
    });
    fcHtml += `</div></div>`;
  } else {
    fcHtml = `<p class="no-fc">Pas de flashcards pour cette diapo.</p>`;
  }

  const prevDisabled = g <= 1 ? "disabled" : "";
  const nextDisabled = g >= totalSlides ? "disabled" : "";

  document.getElementById("main").innerHTML = `
    <div class="slide-section active">
      <span class="pdf-badge ${p.badge}">${p.name.replace(/_/g," ")}</span>
      <div class="slide-img-wrap">
        <img src="slides/pdf${pdfId}_slide${sNum}.png" alt="Diapo ${sNum}">
      </div>
      ${fcHtml}
      <div class="bottom-nav">
        <button class="btn btn-prev" ${prevDisabled} onclick="goSlide(${g-1})">← Précédent</button>
        <button class="btn btn-next" ${nextDisabled} onclick="goSlide(${g+1})">Suivant →</button>
      </div>
    </div>`;

  completed.add(g);
  document.getElementById("progressFill").style.width = (g / totalSlides * 100) + "%";
  document.getElementById("navCounter").textContent = g + " / " + totalSlides;
  buildSidebar();
  window.scrollTo(0, 0);
}

function goSlide(g) {
  if (g < 1 || g > totalSlides) return;
  curSlide = g;
  buildSlide();
}

function revealAll() {
  document.querySelectorAll(".flashcard").forEach(fc => fc.classList.add("flipped"));
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") goSlide(curSlide + 1);
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") goSlide(curSlide - 1);
});

buildSlide();
</script>
</body>
</html>
