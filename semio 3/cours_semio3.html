const allSlides = [];
pdfs.forEach(pdf => {
  for (let s = 1; s <= pdf.totalSlides; s++) {
    allSlides.push({ pdf: pdf.id, slide: s, key: `${pdf.id}-${s}` });
  }
});
const totalSlides = allSlides.length;
let currentSlide = 0;
const completed = new Set();
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  let curPdf = -1;
  allSlides.forEach((s, i) => {
    if (s.pdf !== curPdf) {
      curPdf = s.pdf;
      const pdf = pdfs.find(p => p.id === curPdf);
      html += `<h3>${pdf.label}</h3>`;
    }
    html += `<div class="sidebar-item" data-idx="${i}" id="sb-${i}"><span class="check"></span>Diapo ${s.slide}</div>`;
  });
  sb.innerHTML = html;
  sb.querySelectorAll('.sidebar-item').forEach(el => {
    el.addEventListener('click', () => goTo(parseInt(el.dataset.idx)));
  });
}
function buildSlide(s, idx) {
  const pdf = pdfs.find(p => p.id === s.pdf);
  const fcs = flashcardMap[s.key] || [];
  const imgSrc = `slides/pdf${s.pdf}_slide${s.slide}.png`;
  let fcHtml = '';
  if (fcs.length > 0) {
    fcHtml = `<div class="fc-section">
      <h3>Flashcards (${fcs.length})</h3>
      <button class="btn-reveal" onclick="document.querySelectorAll('#slide-${idx} .flashcard').forEach(c=>c.classList.toggle(\'flipped\'))">Tout révéler / masquer</button>
      <div class="fc-grid">
        ${fcs.map((fc, j) => `
          <div class="flashcard" onclick="this.classList.toggle(\'flipped\')">
            <div class="fc-inner">
              <div class="fc-front"><span class="fc-num">${j+1}</span><span class="fc-text">${fc.q}</span><span class="fc-hint">Cliquer</span></div>
              <div class="fc-back"><span class="fc-num">✓</span><span class="fc-text">${fc.a}</span></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>`;
  } else {
    fcHtml = '<p class="no-fc">Pas de flashcard pour cette diapositive.</p>';
  }
  return `<div class="slide-section" id="slide-${idx}">
    <span class="pdf-badge ${pdf.badge}">${pdf.name}</span>
    <div class="slide-img-wrap"><img src="${imgSrc}" alt="Diapo ${s.slide}" loading="lazy"></div>
    ${fcHtml}
    <div class="bottom-nav">
      <button class="btn btn-prev" onclick="goTo(${idx-1})" ${idx===0?'disabled':''}>← Précédent</button>
      <button class="btn btn-next" onclick="goTo(${idx+1})" ${idx===totalSlides-1?'disabled':''}>Suivant →</button>
    </div>
  </div>`;
}
function render() {
  const main = document.getElementById('main');
  let html = `<div class="pdf-order" id="slide-order">
    <h2>Ordre des cours</h2><ol>`;
  pdfs.forEach(p => {
    html += `<li><strong>${p.name}</strong> — ${p.label}</li>`;
  });
  html += '</ol></div>';
  allSlides.forEach((s, i) => { html += buildSlide(s, i); });
  main.innerHTML = html;
}
function goTo(idx) {
  if (idx < 0 || idx >= totalSlides) return;
  document.querySelectorAll('.slide-section').forEach(el => el.classList.remove('active'));
  const target = document.getElementById('slide-' + idx);
  if (target) target.classList.add('active');
  document.getElementById('slide-order').style.display = idx === 0 ? 'block' : 'none';
  currentSlide = idx;
  completed.add(idx);
  document.querySelectorAll('.sidebar-item').forEach(el => {
    const i = parseInt(el.dataset.idx);
    el.classList.toggle('active', i === idx);
    el.classList.toggle('completed', completed.has(i) && i !== idx);
    el.querySelector('.check').textContent = completed.has(i) ? '✓ ' : '';
  });
  const pct = ((completed.size) / totalSlides * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('navCounter').textContent = `${idx + 1} / ${totalSlides}`;
  const active = document.querySelector('.sidebar-item.active');
  if (active) active.scrollIntoView({ block: 'nearest' });
  window.scrollTo(0, 0);
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); goTo(currentSlide + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); goTo(currentSlide - 1); }
});
buildSidebar();
render();
goTo(0);
</script>
