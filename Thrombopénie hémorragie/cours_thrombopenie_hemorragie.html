  "7-3": [

const allSlides = [];
pdfs.forEach(pdf => {
  for (let s = 1; s <= pdf.totalSlides; s++) {
    allSlides.push({ pdf: pdf.id, slide: s, key: pdf.id + "-" + s });
  }
});

let current = 0;
const visited = new Set();

function buildSidebar() {
  const sb = document.getElementById("sidebar");
  let h = "";
  pdfs.forEach(pdf => {
    h += '<h3 class="' + pdf.badge + '">' + pdf.label + '</h3>';
    for (let s = 1; s <= pdf.totalSlides; s++) {
      const idx = allSlides.findIndex(x => x.pdf === pdf.id && x.slide === s);
      h += '<div class="sidebar-item" data-idx="' + idx + '" id="sb-' + idx + '">Diapo ' + s + '</div>';
    }
  });
  sb.innerHTML = h;
  sb.querySelectorAll(".sidebar-item").forEach(el => {
    el.addEventListener("click", () => goTo(parseInt(el.dataset.idx)));
  });
}

function buildSlides() {
  const main = document.getElementById("main");
  let h = "";
  allSlides.forEach((sl, idx) => {
    const pdf = pdfs.find(p => p.id === sl.pdf);
    const fcs = flashcardMap[sl.key] || [];
    h += '<div class="slide-section" id="slide-' + idx + '">';
    h += '<span class="pdf-badge ' + pdf.badge + '">' + pdf.label + '</span>';
    h += '<div class="slide-img-wrap"><img src="slides/pdf' + sl.pdf + '_slide' + sl.slide + '.png" alt="Diapo ' + sl.slide + '" loading="lazy"></div>';
    if (fcs.length > 0) {
      h += '<div class="fc-section"><h3>Flashcards (' + fcs.length + ')</h3>';
      h += '<button class="btn-reveal" onclick="revealAll(' + idx + ')">Révéler toutes les réponses</button>';
      h += '<div class="fc-grid">';
      fcs.forEach((fc, i) => {
        h += '<div class="flashcard" onclick="this.classList.toggle(\'flipped\')">';
        h += '<div class="fc-inner">';
        h += '<div class="fc-front"><span class="fc-num">' + (i + 1) + '</span><span class="fc-text">' + fc.q + '</span><span class="fc-hint">cliquer</span></div>';
        h += '<div class="fc-back"><span class="fc-num">✓</span><span class="fc-text">' + fc.a + '</span></div>';
        h += '</div></div>';
      });
      h += '</div></div>';
    } else {
      h += '<p class="no-fc">Pas de flashcards pour cette diapo.</p>';
    }
    h += '<div class="bottom-nav">';
    h += '<button class="btn btn-prev" onclick="goTo(' + (idx - 1) + ')"' + (idx === 0 ? " disabled" : "") + '>← Précédent</button>';
    h += '<button class="btn btn-next" onclick="goTo(' + (idx + 1) + ')"' + (idx === allSlides.length - 1 ? " disabled" : "") + '>Suivant →</button>';
    h += '</div></div>';
  });
  main.innerHTML = h;
}

function goTo(idx) {
  if (idx < 0 || idx >= allSlides.length) return;
  document.querySelectorAll(".slide-section").forEach(el => el.classList.remove("active"));
  document.getElementById("slide-" + idx).classList.add("active");
  visited.add(idx);
  current = idx;
  document.querySelectorAll(".sidebar-item").forEach(el => el.classList.remove("active"));
  const sbEl = document.getElementById("sb-" + idx);
  if (sbEl) {
    sbEl.classList.add("active");
    sbEl.scrollIntoView({ block: "nearest" });
  }
  visited.forEach(v => {
    const vEl = document.getElementById("sb-" + v);
    if (vEl && v !== idx) vEl.classList.add("completed");
  });
  document.getElementById("progressFill").style.width = ((idx + 1) / allSlides.length * 100) + "%";
  document.getElementById("navCounter").textContent = (idx + 1) + " / " + allSlides.length;
  window.scrollTo(0, 0);
}

function revealAll(idx) {
  document.getElementById("slide-" + idx).querySelectorAll(".flashcard").forEach(fc => fc.classList.add("flipped"));
}

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") { e.preventDefault(); goTo(current + 1); }
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") { e.preventDefault(); goTo(current - 1); }
});

buildSidebar();
buildSlides();
goTo(0);
</script>
